<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginStyle.css">
    <title>Formulario de login</title>

    <!-- Fuentes de texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Comienzo del sprite -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">

        <!-- Icono user del "Ingresar" -->
        <symbol id="icon-user" viewBox="0 0 24 24">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2" />
        </symbol>

        <!-- Icono carrito de compras -->
        <symbol id="icon-cart" viewBox="0 0 24 24">
            <circle cx="8" cy="21" r="1" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="19" cy="21" r="1" fill="none" stroke="currentColor" stroke-width="2" />
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>

        <!-- Icono lupa de busqueda -->
        <symbol id="icon-search" viewBox="0 0 24 24">
            <path d="m21 21-4.34-4.34" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2" />
        </symbol>

        <!-- Icono menu -->
        <symbol id="icon-menu" viewBox="0 0 24 24">
            <path d="M4 5h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M4 12h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M4 19h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
        </symbol>

    </svg>
    <!-- Fin del sprite -->

    <header>
        <div class="header__top">
            <img src="assets/techBoxLogo.png" alt="Logo" class="logo">
            <div class="header__container">
                <form class="header__search-form">
                    <div class="header__search-box">
                        <label for="search" class="header__sr-only">Buscar productos</label>
                        <input id="search" placeholder="Buscar..." type="text" class="header__inputSearch">
                        <button type="submit" class="header__search-btn">
                            <svg class="icon-search">
                                <use href="#icon-search"></use>
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="header__container-navegation">
                    <button class="container-navegation__button-menu">
                        <svg class="icon">
                            <use href="#icon-menu"></use>
                        </svg>
                    </button>
                    <nav class="container-navegation__header-navegation">
                        <a href="#" class="ingresar">
                            <strong>Ingresar</strong>
                            <svg class="icon">
                                <use href="#icon-user"></use>
                            </svg>
                        </a>
                        <a href="#" class="shopping-cart">
                            <svg class="icon">
                                <use href="#icon-cart"></use>
                            </svg>
                        </a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="container">
            <h2 id="tituloForm">Inicio de sesión</h2>
            <p class="descriptions">Ingresa tus datos para iniciar sesión</p>
            <form class="login">
                <input class="login__input" type="email" placeholder="Email*">
                <div class="login__password">
                    <input class="login__input" type="password" placeholder="Contraseña*">
                    <p>Olvidaste tu contraseña? Entra <a href="#" class="link-p">aquí</a></p>
                </div>
                <div class="login__input-remember">
                    <label class="login__checkbox">
                        <input type="checkbox" id="remember">
                        <span class="remember">Recordarme</span>
                    </label>
                    <button type="submit" class="buttonSubmit">Iniciar sesión</button>
                </div>
            </form>
            <p class="descriptions">¿No tienes una cuenta? Registrate <a href="#" class="link-p">aquí</a></p>
        </section>
    </main>

</body>

</html>
