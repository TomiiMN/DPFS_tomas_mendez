<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registerStyle.css">
    <title>Registro</title>

    <!-- Fuentes de texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Comienzo del sprite -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">

        <!-- Icono user del "Ingresar" -->
        <symbol id="icon-user" viewBox="0 0 24 24">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2" />
        </symbol>

        <!-- Icono carrito de compras -->
        <symbol id="icon-cart" viewBox="0 0 24 24">
            <circle cx="8" cy="21" r="1" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="19" cy="21" r="1" fill="none" stroke="currentColor" stroke-width="2" />
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </symbol>

    </svg>
    <!-- Fin del sprite -->

    <header class="header-top">
        <img src="./assets/techBoxLogo.png" alt="Logo" class="logo">
        <div class="navigation-header">
            <a href="#">
                <div class="ingresar">
                    <strong>Ingresar</strong>
                    <svg class="icon">
                        <use href="#icon-user"></use>
                    </svg>
                </div>
            </a>
            <a href="#" class="shopping-cart">
                <svg class="icon">
                    <use href="#icon-cart"></use>
                </svg>
            </a>
        </div>
    </header>

    <main>
        <div class="container">
            <h2 id="tituloForm">Registro de Usuario</h2>
            <p>Ingresa tus datos para crear una cuenta</p>
            <form>
                <input type="email" placeholder="Email*">
                <input type="text" placeholder="Nombre de Usuario*">
                <input type="text" placeholder="Nombre*">
                <input type="text" placeholder="Apellido*">
                <input type="password" placeholder="Contraseña*">
                <input type="password" placeholder="Repetir contraseña*">
                <button type="submit" class="buttonSubmit">Registrarme</button>
            </form>
            <p>¿Ya tienes una cuenta? Inicia sesión <a href="#" id="link-p">aquí</a></p>
        </div>
    </main>

</body>

</html>
